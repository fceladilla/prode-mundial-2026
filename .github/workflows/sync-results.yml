# Sincroniza resultados desde football-data.org durante el Mundial
# (11 jun - 19 jul 2026) y evalua los pronosticos.
#
# Cadencia (cron en UTC): cada 5 min durante la franja horaria en que hay
# partidos y cada hora el resto del dia como red de seguridad. El sync ya NO
# controla cuando se cierran/revelan los pronosticos (eso pasa a la hora exacta
# del kickoff, por cliente + reglas); solo trae el resultado final + puntos y
# marca "live". El plan gratuito permite 10 req/min y el sync hace 1 por corrida,
# y el repo es publico (minutos de Actions ilimitados): la frecuencia es libre.
# La franja 15-05 UTC cubre desde el kickoff mas temprano (mediodia ET ~16 UTC)
# hasta el final del mas tardio (noche PT ~06 UTC).
#
# Secrets requeridos (Settings -> Secrets and variables -> Actions):
#   FOOTBALL_DATA_API_KEY     token de football-data.org (plan gratuito)
#   FIREBASE_SERVICE_ACCOUNT  JSON de la service account en una sola linea
name: Sync resultados

on:
  schedule:
    # Cada 5 min durante horas de partido (UTC).
    - cron: '*/5 15-23,0-5 * * *'
    # Cada hora el resto del dia (red de seguridad).
    - cron: '0 6-14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync resultados y evaluar pronosticos
        run: npx tsx scripts/syncResults.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
