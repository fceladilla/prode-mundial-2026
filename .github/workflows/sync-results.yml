# Sincroniza resultados desde football-data.org cada 30 minutos durante el
# Mundial (11 jun - 19 jul 2026) y evalua los pronosticos.
#
# Secrets requeridos (Settings -> Secrets and variables -> Actions):
#   FOOTBALL_DATA_API_KEY     token de football-data.org (plan gratuito)
#   FIREBASE_SERVICE_ACCOUNT  JSON de la service account en una sola linea
name: Sync resultados

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync resultados y evaluar pronosticos
        run: npx tsx scripts/syncResults.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
