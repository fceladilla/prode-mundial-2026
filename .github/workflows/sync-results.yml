# Sincroniza resultados desde football-data.org durante el Mundial
# (11 jun - 19 jul 2026) y evalua los pronosticos.
#
# Cadencia (cron en UTC): el sync solo FINALIZA partidos (resultado + puntos);
# el "en vivo" se calcula en el cliente por la hora de kickoff (sin escrituras) y
# los pronosticos se cierran/revelan a la hora exacta (cliente + reglas). Por eso
# no hace falta correr seguido: cada 30 min durante la franja de partidos alcanza
# para finalizar poco despues de que terminan, y mantiene bajo el consumo de
# lecturas de Firestore (plan Spark con tope diario). Cada corrida hace 1 request
# a football-data.org (limite 10/min). La franja 15-05 UTC cubre desde el kickoff
# mas temprano (mediodia ET ~16 UTC) hasta el final del mas tardio (noche PT ~06).
#
# Secrets requeridos (Settings -> Secrets and variables -> Actions):
#   FOOTBALL_DATA_API_KEY     token de football-data.org (plan gratuito)
#   FIREBASE_SERVICE_ACCOUNT  JSON de la service account en una sola linea
name: Sync resultados

on:
  schedule:
    # Cada 30 min durante horas de partido (UTC).
    - cron: '*/30 15-23,0-5 * * *'
    # Cada 2 horas el resto del dia (red de seguridad).
    - cron: '0 6-14/2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync resultados y evaluar pronosticos
        run: npx tsx scripts/syncResults.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
